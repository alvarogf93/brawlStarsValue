# BrawlVision CI — quality gates for every push and PR to main.
#
# Closes audit finding TEST-01 (see docs/audits/2026-04-28-1147/fase-5-testing.md
# and MASTER-TODO.md): the suite has 758 tests but no automation runs them, so
# auth-contract regressions or cookie -> Bearer downgrades could merge silently.
#
# Branch protection: this workflow is intended to be a REQUIRED CHECK on `main`.
# That cannot be enabled from code — a human must do it once in
#   GitHub -> Settings -> Branches -> Branch protection rules -> main
# and tick "Require status checks to pass before merging" for the jobs:
#   typecheck, lint, unit, e2e, build.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Default permissions are fine — no PR comments, no release artifacts yet.

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      # Errors must stay at 0. Warnings (currently 70, mostly <img>) are
      # tracked separately and not gating yet.
      - run: npx eslint .

  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      - run: npx vitest run

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # playwright.config.ts has a webServer block that boots `npm run dev`,
      # so no separate dev-server step is needed here.
      - run: npx playwright test
        env:
          CI: 'true'

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      - run: npm run build
